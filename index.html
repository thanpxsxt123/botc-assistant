<!-- ─── หน้ากากสร้างห้อง / เข้าร่วมห้อง (Lobby Overlay) ─── -->
<div id="lobbyOverlay" style="
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: var(--bg-deep); z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
">
  <div style="
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); width: 100%; max-width: 420px;
    padding: 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    position: relative; overflow: hidden;
  ">
    <!-- แถบแสงตกแต่งด้านบน -->
    <div style="position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent);"></div>
    
    <!-- โลโก้และหัวข้อ -->
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="font-family: 'Cinzel', serif; font-size: 22px; color: var(--gold-bright); letter-spacing: 0.1em; margin-bottom: 6px;">
        BLOOD ON THE CLOCKTOWER
      </h1>
      <p style="font-family: 'Crimson Text', serif; font-size: 14px; font-style: italic; color: var(--text-muted);">
        — Assistant Realm —
      </p>
    </div>

    <!-- ฟอร์มป้อนข้อมูล -->
    <div style="display: flex; flex-direction: column; gap: 1.25rem;">
      
      <!-- ช่องรหัสห้อง -->
      <div>
        <label style="font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 6px;">
          รหัสห้อง (Room Code)
        </label>
        <input type="text" id="lobbyRoomInput" placeholder="ตัวอย่าง: DEMO, BKK99" style="
          width: 100%; background: var(--bg-surface); border: 1px solid var(--border-dim);
          border-radius: 6px; color: var(--text-main); padding: 10px 14px;
          font-family: 'Cinzel', serif; font-size: 16px; letter-spacing: 0.1em; outline: none;
        " oninput="this.value = this.value.toUpperCase()">
      </div>

      <!-- ช่องชื่อผู้เล่น (ซ่อนอัตโนมัติถ้าเปิดในหน้า Storyteller) -->
      <div id="lobbyNameSection">
        <label style="font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 6px;">
          ชื่อของคุณ (Your Name)
        </label>
        <input type="text" id="lobbyNameInput" placeholder="พิมพ์ชื่อเล่นของคุณ..." style="
          width: 100%; background: var(--bg-surface); border: 1px solid var(--border-dim);
          border-radius: 6px; color: var(--text-main); padding: 10px 14px;
          font-family: 'Sarabun', sans-serif; font-size: 14px; outline: none;
        ">
      </div>

      <!-- ปุ่มกดจัดการ -->
      <div style="margin-top: 0.5rem; display: flex; flex-direction: column; gap: 8px;">
        <button onclick="submitLobby()" class="btn-action primary" style="
          width: 100%; padding: 12px; font-size: 12px; font-weight: bold;
          border-radius: 6px; cursor: pointer; text-transform: uppercase;
        ">
          🔮 เข้าสู่โบสถ์ศักดิ์สิทธิ์ (Enter Game)
        </button>
      </div>

      <!-- เส้นคั่นสลับโหมดการเล่น -->
      <div style="display: flex; align-items: center; text-align: center; margin: 10px 0;">
        <div style="flex: 1; border-bottom: 1px dashed var(--border-dim);"></div>
        <span style="padding: 0 10px; font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em;">สลับโหมด</span>
        <div style="flex: 1; border-bottom: 1px dashed var(--border-dim);"></div>
      </div>

      <!-- ปุ่มสลับหน้าบทบาทเพื่อความไว -->
      <div id="lobbyRoleSwitcher" style="text-align: center;">
        <!-- จะถูกวาดปุ่มสลับลิงก์โดยอัตโนมัติผ่าน JavaScript -->
      </div>

    </div>
  </div>
</div>
