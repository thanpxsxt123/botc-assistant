<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOTC Assistant — ล็อบบี้วิหารศักดิ์สิทธิ์</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:ital,wght@0,600;1,400&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #060508; --bg-card: #0d0b10; --bg-surface: #151219;
    --purple: #7c5cbf; --purple-bright: #b08ee8; --gold: #c9a84c; --gold-bright: #f0c96a;
    --text-main: #e2d9f0; --text-muted: #8a7aa0; --text-dim: #4a3f5a; --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg-deep); color: var(--text-main); font-family: 'Sarabun', sans-serif;
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    background-image: radial-gradient(ellipse at 50% 30%, rgba(124,92,191,0.1) 0%, transparent 60%);
  }
  .lobby-container {
    background: var(--bg-card); border: 1px solid rgba(124,92,191,0.25); border-radius: var(--radius);
    width: 100%; max-width: 440px; padding: 2.5rem 2rem; box-shadow: 0 20px 50px rgba(0,0,0,0.6); position: relative;
  }
  .lobby-container::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-family: 'Cinzel', serif; font-size: 24px; color: var(--gold-bright); letter-spacing: 0.08em; margin-bottom: 4px; }
  .header p { font-family: 'Crimson Text', serif; font-style: italic; color: var(--text-muted); font-size: 15px; }
  .form-group { margin-bottom: 1.25rem; }
  label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; display: block; margin-bottom: 6px; }
  input {
    width: 100%; background: var(--bg-surface); border: 1px solid rgba(124,92,191,0.15); border-radius: 6px;
    color: var(--text-main); padding: 11px 14px; font-size: 14px; outline: none; transition: border 0.2s;
  }
  input:focus { border-color: var(--purple); }
  input#roomCode { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 0.1em; text-transform: uppercase; text-align: center; color: var(--gold); }
  .mode-selection {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 1.5rem;
  }
  .btn {
    width: 100%; padding: 12px; border-radius: 6px; font-family: 'Cinzel', serif; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; border: 1px solid transparent;
    line-height: 1.4;
  }
  .btn-primary { background: rgba(124,92,191,0.2); border-color: rgba(124,92,191,0.4); color: var(--purple-bright); }
  .btn-primary:hover { background: rgba(124,92,191,0.35); }
  .btn-gold { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); color: var(--gold-bright); }
  .btn-gold:hover { background: rgba(201,168,76,0.3); }
  .divider { display: flex; align-items: center; text-align: center; margin: 1.5rem 0 1rem 0; color: var(--text-dim); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; }
  .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px dashed rgba(124,92,191,0.1); }
  .divider span { padding: 0 10px; }
</style>
</head>
<body>

<div class="lobby-container">
  <div class="header">
    <h1>BLOOD ON THE CLOCKTOWER</h1>
    <p>— Assistant Realm —</p>
  </div>

  <div id="mainView">
    <div class="divider"><span>สร้างวิหารใหม่ (Create Room)</span></div>
    <div class="form-group">
      <input type="text" id="createRoomCode" placeholder="รหัสห้องที่ต้องการ..." oninput="this.value = this.value.toUpperCase()">
    </div>
    <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 1rem;">
      <input type="checkbox" id="hasST" checked style="width: 18px; height: 18px; accent-color: var(--gold);">
      <label for="hasST" style="margin-bottom: 0; cursor: pointer; font-size: 12px;">มี Storyteller คุมเกม (Manual Mode)</label>
    </div>
    <div class="mode-selection" style="grid-template-columns: 1fr;">
      <button class="btn btn-gold" onclick="createRoomAction()">🏰 สร้างห้องและเข้าสู่ล็อบบี้</button>
    </div>

    <div class="divider"><span>เข้าร่วมวงเกม (Join Room)</span></div>
    <div class="form-group">
      <input type="text" id="joinRoomCode" placeholder="รหัสห้อง..." oninput="this.value = this.value.toUpperCase()">
    </div>
    <div class="form-group">
      <input type="text" id="joinPlayerName" placeholder="ชื่อเล่นของคุณ...">
    </div>
    <div class="mode-selection" style="grid-template-columns: 1fr;">
      <button class="btn btn-primary" onclick="joinRoomAction()">🔮 เข้าร่วมเป็นผู้เล่น (Join Player)</button>
    </div>
  </div>
</div>

<script>
async function createRoomAction() {
  const room = document.getElementById('createRoomCode').value.trim().toUpperCase();
  const hasST = document.getElementById('hasST').checked;
  if (!room) { alert('กรุณาระบุรหัสห้องครับ'); return; }

  try {
    const res = await fetch('/api/create-room', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ room_code: room, is_automated: !hasST })
    });
    const data = await res.json();
    
    if (hasST) {
      window.location.href = `/storyteller?room=${room}`;
    } else {
      window.location.href = `/player?room=${room}&name=Host`;
    }
  } catch (err) { alert('ไม่สามารถสร้างห้องได้ในขณะนี้'); }
}

async function joinRoomAction() {
  const room = document.getElementById('joinRoomCode').value.trim().toUpperCase();
  const name = document.getElementById('joinPlayerName').value.trim();

  if (!room || !name) { alert('กรุณากรอกข้อมูลให้ครบถ้วนครับ'); return; }

  try {
    const res = await fetch('/api/session/' + room);
    const data = await res.json();
    window.location.href = `/player?room=${room}&name=${encodeURIComponent(name)}`;
  } catch (err) { alert('ไม่พบห้องที่ระบุ'); }
}
</script>
</body>
</html>
