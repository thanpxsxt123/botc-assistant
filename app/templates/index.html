<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOTC Assistant - Player Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; transition: background-color 0.5s, color 0.5s; }
        /* Night Theme */
        body.theme-night { background-color: #0f172a; color: #94a3b8; }
        body.theme-night .card { background-color: #1e293b; border-color: #334155; }
        body.theme-night .text-highlight { color: #f8fafc; }
        
        /* Day Theme */
        body.theme-day { background-color: #f8fafc; color: #475569; }
        body.theme-day .card { background-color: #ffffff; border-color: #e2e8f0; border: 1px solid #e2e8f0; }
        body.theme-day .text-highlight { color: #1e293b; }

        .card { border-radius: 12px; transition: all 0.3s; border: 1px solid transparent; }
        .btn-primary { background-color: #e94560; color: white; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.95); }
        
        .nomination-card { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8 theme-night" id="body">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold mb-2 tracking-tighter text-highlight">BLOOD ON THE CLOCKTOWER</h1>
            <div id="game-info" class="flex justify-center gap-4 text-sm font-semibold uppercase tracking-widest">
                <span id="room-display" class="bg-blue-600 text-white px-3 py-1 rounded">ROOM: ----</span>
                <span id="day-display" class="bg-amber-600 text-white px-3 py-1 rounded">DAY 0</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Phase Status -->
            <div class="card p-6 shadow-xl md:col-span-1 text-center">
                <p class="text-xs uppercase tracking-widest opacity-60 mb-1">Current Phase</p>
                <h2 id="phase-display" class="text-3xl font-bold text-highlight uppercase">WAITING...</h2>
                <div id="timer-container" class="mt-4 hidden">
                    <p class="text-[10px] font-bold text-rose-500 uppercase">Discussion Time</p>
                    <div id="countdown" class="text-4xl font-black text-rose-500">05:00</div>
                </div>
            </div>

            <!-- Main Display -->
            <div class="card p-6 shadow-xl md:col-span-2 relative overflow-hidden">
                <div id="nomination-active" class="hidden">
                    <p class="text-xs uppercase tracking-widest opacity-60 mb-2">Active Nomination</p>
                    <div class="flex justify-between items-center">
                        <div>
                            <span id="active-nominee" class="text-2xl font-bold text-highlight underline decoration-rose-500">Player Name</span>
                            <p class="text-sm">Proposed by <span id="active-nominator">Nominator</span></p>
                        </div>
                        <div class="text-right">
                            <span id="vote-count" class="text-5xl font-black text-rose-500">0</span>
                            <p class="text-xs opacity-60">VOTES</p>
                        </div>
                    </div>
                </div>

                <!-- Night Action Panel -->
                <div id="night-panel" class="hidden text-center py-4">
                    <h3 class="text-xl font-bold text-highlight mb-4">🌙 เลือกเป้าหมายสำหรับพลังของคุณ</h3>
                    <div class="flex flex-wrap justify-center gap-3" id="target-list">
                        <!-- Targets will be injected here -->
                    </div>
                    <button id="btn-submit-action" class="mt-6 bg-purple-600 hover:bg-purple-700 px-8 py-3 rounded-full font-bold text-white shadow-lg hidden transition">
                        SUBMIT ACTION 🪄
                    </button>
                </div>

                <div id="waiting-display" class="flex items-center justify-center h-full">
                    <p class="text-gray-500 italic">รอเริ่มเกม หรือรอการเสนอชื่อ...</p>
                </div>
            </div>

            <!-- Feed -->
            <div class="card p-6 shadow-xl md:col-span-3">
                <h3 class="font-bold mb-2">Game Feed</h3>
                <div id="log-feed" class="space-y-2 max-h-60 overflow-y-auto text-sm">
                    <!-- Logs will appear here -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room') || 'DEMO1';
        const sessionId = urlParams.get('session') || '1';
        const playerId = urlParams.get('player_id') || '1';
        let selectedTargetId = null;
        let countdownInterval = null;

        document.getElementById('room-display').innerText = `ROOM: ${roomCode}`;

        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            socket = new WebSocket(`${protocol}//${window.location.host}/ws/${roomCode}`);

            socket.onopen = () => addLog("ระบบ: เชื่อมต่อสำเร็จ พร้อมรับข้อมูล...");
            socket.onclose = () => {
                addLog("ระบบ: การเชื่อมต่อหลุด กำลังพยายามเชื่อมต่อใหม่...");
                setTimeout(connectWS, 2000);
            };

            socket.onmessage = (event) => {
                const msg = JSON.parse(event.data);
                handleEvent(msg);
            };
        }

        function handleEvent(msg) {
            switch(msg.event) {
                case "phase_change":
                    updatePhase(msg.data.phase, msg.data.day, msg.data.timer_expires);
                    break;
                case "new_nomination":
                    showNomination(msg.data.nominator, msg.data.nominee);
                    break;
                case "vote_updated":
                    updateVotes(msg.data.votes, msg.data.is_closed);
                    break;
                case "game_over":
                    addLog(`🏆 จบเกม: ${msg.data.winner === 'GOOD_WINS' ? 'ฝ่ายเมืองชนะ!' : 'ฝ่ายปีศาจชนะ!'}`);
                    document.getElementById('phase-display').innerText = "GAME OVER";
                    break;
            }
        }

        function updatePhase(phase, day, expiresAt) {
            const body = document.getElementById('body');
            const phaseDisplay = document.getElementById('phase-display');
            const dayDisplay = document.getElementById('day-display');
            const timerContainer = document.getElementById('timer-container');

            phaseDisplay.innerText = phase.replace('_', ' ');
            dayDisplay.innerText = `DAY ${day}`;

            // Handle Timer
            if (expiresAt) {
                timerContainer.classList.remove('hidden');
                startCountdown(expiresAt);
            } else {
                timerContainer.classList.add('hidden');
                clearInterval(countdownInterval);
            }

            if (phase.includes('NIGHT')) {
                body.className = "p-4 md:p-8 theme-night";
                document.getElementById('night-panel').classList.remove('hidden');
                document.getElementById('waiting-display').classList.add('hidden');
                loadTargets();
            } else {
                body.className = "p-4 md:p-8 theme-day";
                document.getElementById('night-panel').classList.add('hidden');
                document.getElementById('waiting-display').classList.remove('hidden');
            }
            
            addLog(`เฟส: เปลี่ยนเป็น ${phase} วันที่ ${day}`);
            
            if (phase !== 'DAY_VOTING') {
                document.getElementById('nomination-active').classList.add('hidden');
            }
        }

        function startCountdown(expiresAt) {
            clearInterval(countdownInterval);
            const endTime = new Date(expiresAt).getTime();

            countdownInterval = setInterval(() => {
                const now = new Date().getTime();
                const distance = endTime - now;

                if (distance < 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown').innerText = "00:00";
                    return;
                }

                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);
                
                document.getElementById('countdown').innerText = 
                    `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                if (distance < 30000) { // Red alert last 30s
                    document.getElementById('countdown').classList.add('animate-pulse');
                } else {
                    document.getElementById('countdown').classList.remove('animate-pulse');
                }
            }, 1000);
        }

        async function loadTargets() {
            try {
                const response = await fetch(`/api/grimoire?session_id=${sessionId}`);
                const data = await response.json();
                const container = document.getElementById('target-list');
                container.innerHTML = '';
                
                data.players.forEach(p => {
                    if (p.id != playerId && p.is_alive) {
                        const btn = document.createElement('button');
                        btn.className = "px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-lg text-white transition border-2 border-transparent";
                        btn.innerText = p.name;
                        btn.onclick = () => {
                            document.querySelectorAll('#target-list button').forEach(b => {
                                b.classList.remove('border-rose-500');
                                b.classList.add('border-transparent');
                            });
                            btn.classList.remove('border-transparent');
                            btn.classList.add('border-rose-500');
                            selectedTargetId = p.id;
                            document.getElementById('btn-submit-action').classList.remove('hidden');
                        };
                        container.appendChild(btn);
                    }
                });
            } catch (err) {
                console.error("Failed to load targets:", err);
            }
        }

        document.getElementById('btn-submit-action').onclick = async () => {
            if (!selectedTargetId) return;
            
            try {
                const response = await fetch('/api/player-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        session_id: parseInt(sessionId),
                        player_id: parseInt(playerId),
                        target_id: parseInt(selectedTargetId),
                        action_type: "AUTO_ROLE_ACTION"
                    })
                });
                const result = await response.json();
                if (result.status === 'success') {
                    addLog("✨ พลังของคุณถูกส่งออกไปแล้ว...");
                    document.getElementById('night-panel').innerHTML = `<p class="text-green-400 font-bold py-8 animate-pulse text-2xl">✅ ส่งข้อมูลแล้ว รอเช้าวันใหม่...</p>`;
                }
            } catch (err) {
                addLog("❌ ข้อผิดพลาดในการส่งพลัง");
            }
        };

        function showNomination(nominator, nominee) {
            document.getElementById('nomination-active').classList.remove('hidden');
            document.getElementById('waiting-display').classList.add('hidden');
            document.getElementById('active-nominee').innerText = nominee;
            document.getElementById('active-nominator').innerText = nominator;
            document.getElementById('vote-count').innerText = "0";
            
            addLog(`🔔 การเสนอชื่อ: ${nominator} เสนอชื่อ ${nominee}`);
        }

        function updateVotes(count, isClosed) {
            const voteEl = document.getElementById('vote-count');
            voteEl.innerText = count;
            
            if (isClosed) {
                addLog(`🗳️ สรุปคะแนน: ${count} โหวต (ปิดการรับโหวต)`);
                voteEl.classList.add('text-gray-500');
            } else {
                voteEl.classList.remove('text-gray-500');
                voteEl.classList.add('animate-ping');
                setTimeout(() => voteEl.classList.remove('animate-ping'), 500);
            }
        }

        function addLog(text) {
            const feed = document.getElementById('log-feed');
            const div = document.createElement('div');
            div.className = "p-2 bg-black bg-opacity-5 rounded nomination-card border-l-4 border-rose-500";
            div.innerHTML = `<span class="opacity-50 text-xs">${new Date().toLocaleTimeString()}</span><br>${text}`;
            feed.prepend(div);
        }

        connectWS();
    </script>
</body>
</html>
